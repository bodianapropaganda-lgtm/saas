<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Regression Graph Console</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">RG</span>
          <div>
            <strong>Regression Graph</strong>
            <small>Discovery-регресс для test env</small>
          </div>
        </div>

        <nav class="main-nav" aria-label="Основные разделы">
          <button class="nav-item active" data-view="overview" type="button">Обзор</button>
          <button class="nav-item" data-view="target" type="button">Цель сканирования</button>
          <button class="nav-item" data-view="runs" type="button">Прогоны</button>
          <button class="nav-item" data-view="review" type="button">Очередь ревью</button>
          <button class="nav-item" data-view="catalog" type="button">Каталог endpoint</button>
          <button class="nav-item" data-view="graph" type="button">Graph</button>
        </nav>

        <section class="sidebar-panel">
          <h2>Окружение</h2>
          <button class="environment-card active" type="button">
            <span>Staging</span>
            <strong>http://127.0.0.1:8131</strong>
            <small>Последний прогон: 34 diff</small>
          </button>
          <button class="environment-card" type="button">
            <span>QA sandbox</span>
            <strong>https://qa.example.internal</strong>
            <small>Baseline ожидает обновления</small>
          </button>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="topbar-project">Проект: загрузка...</p>
            <h1 id="view-title">Обзор regression discovery</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost" data-view="target" type="button">Настроить target</button>
            <button class="primary" id="topbar-run" type="button">Запустить discovery</button>
          </div>
        </header>

        <section class="status-strip" id="status-strip">
          <article><span>Baseline</span><strong>загрузка...</strong></article>
          <article><span>Текущий прогон</span><strong>загрузка...</strong></article>
          <article><span>Критично</span><strong>загрузка...</strong></article>
          <article><span>Последний запуск</span><strong>загрузка...</strong></article>
        </section>

        <section id="view-root"></section>
      </main>

      <aside class="details-drawer" id="details-drawer"></aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
